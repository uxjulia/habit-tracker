services:
  app:
    build: .
    container_name: habit-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - habit-data:/data
    environment:
      DATABASE_URL: file:/data/habits.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      NODE_ENV: production
      # Uncomment to skip the first-run web setup wizard:
      # SETUP_USERNAME: ${SETUP_USERNAME}
      # SETUP_PASSWORD: ${SETUP_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional nginx for TLS — run with: docker compose --profile with-nginx up
  nginx:
    image: nginx:alpine
    container_name: habit-tracker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    profiles:
      - with-nginx

volumes:
  habit-data:
    driver: local
